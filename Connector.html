<script>
  let socket;

  const fetchNui = (url, data) => {
    return fetch(`https://${GetParentResourceName()}/${url}`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json; charset=UTF-8",
      },
      body: JSON.stringify(data),
    });
  };

  const reconnectWebSocket = (channelName, channelPassword, username) => {
    console.log("Reconnecting...");
    setTimeout(connectWebSocket(channelName, channelPassword, username), 2000);
  };

  const connectWebSocket = (channelName, channelPassword, username) => {
    socket = new WebSocket("ws://localhost:3005");
    socket.onopen = () => {
      console.log("WebSocket Connected");
      socket.send(
        JSON.stringify({
          method: "joinChannel",
          data: {
            channel: channelName,
            password: channelPassword,
            username: username,
          },
        })
      );
      fetchNui("connected", {});
    };

    socket.onclose = (event) => {
      console.log("WebSocket Disconnected, Code:", event.code);
      switch (event.code) {
        case 1000:
          fetchNui("disconnected", {});
          reconnectWebSocket(channelName, channelPassword, username);
          break;
        case 1005:
          reconnectWebSocket(channelName, channelPassword, username);
          break;

        case 1006:
          reconnectWebSocket(channelName, channelPassword, username);
          break;
      }
    };

    socket.onmessage = (event) => {
      console.info("WebSocket Message:", event.data);
      const voiceData = ({ data, method } = JSON.parse(event.data));

      switch (voiceData.method) {
        case "talking":
          console.log(
            voiceData.data.name,
            "is talking: ",
            voiceData.data.status
          );
          break;

        case "Connected":
          socket.send(
            JSON.stringify({
              method: "joinChannel",
              data: {
                channel: channelName,
                password: channelPassword,
                username: username,
              },
            })
          );
          break;

        case "success":
          break;
      }
    };

    socket.onerror = (error) => {
      console.log("WebSocket Error:", error);
    };
  };

  // add an event listener, to listen to NUI Events
  window.addEventListener("message", function (event) {
    switch (event.data.action) {
      case "send": {
        if (socket && socket.readyState === WebSocket.OPEN) {
          socket.send(JSON.stringify(event.data.data));
        } else {
          console.log("Socket is not connected");
        }
        break;
      }

      case "init": {
        connectWebSocket(
          event.data.channelName,
          event.data.channelPassword,
          event.data.username
        );
      }
    }
  });
</script>
